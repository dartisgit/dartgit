services:
  server:
    image: gitea/gitea:1.23
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=aws-0-eu-west-1.pooler.supabase.com:5432
      - GITEA__database__NAME=postgres
      - GITEA__database__USER=postgres.yxtbhdckikvhbbpufsqg
      - GITEA__database__PASSWD=${DB_PASSWORD}
      - GITEA__database__SSL_MODE=require

    restart: always
    networks:
      - gitea
    volumes:
      - ./gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres.yxtbhdckikvhbbpufsqg
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=gitea
    networks:
      - gitea
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

networks:
  gitea:
    external: false

